name: Test & lint

# The regression suite + every content rule, on every push — a bad commit
# fails loudly before it can reach a learner.
on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci --omit=dev
      # Python 3 is preinstalled on ubuntu-latest; the runner needs it.
      - run: npm test
